name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          brew install create-dmg
          pip3 install --break-system-packages Pillow

      - name: Build and package
        env:
          OPEN_ISLAND_APP_NAME: "Open Island"
          OPEN_ISLAND_BUNDLE_ID: "app.openisland.worksafe"
          OPEN_ISLAND_VERSION: ${{ steps.version.outputs.version }}
          OPEN_ISLAND_BUILD_NUMBER: ${{ github.run_number }}
          OPEN_ISLAND_UNIVERSAL: "true"
        run: zsh scripts/package-app.sh

      - name: Verify artifacts
        run: |
          test -f "output/package/Open Island.zip"
          test -f "output/package/Open Island.dmg"
          ls -lh output/package/

      - name: Verify bundle structure
        run: |
          bundle="output/package/Open Island.app"
          for f in \
            "Contents/MacOS/OpenIslandApp" \
            "Contents/Helpers/OpenIslandHooks" \
            "Contents/Helpers/OpenIslandSetup" \
            "Contents/Resources/OpenIsland.icns" \
            "Contents/Resources/OpenIsland_OpenIslandApp.bundle"
          do
            if [[ ! -e "$bundle/$f" ]]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done

          if [[ -d "$bundle/Contents/Frameworks/Sparkle.framework" ]]; then
            echo "::error::Sparkle.framework must not be bundled in the work-safe fork"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Open Island $GITHUB_REF_NAME" \
            --generate-notes \
            --latest \
            "output/package/Open Island.dmg#Open Island.dmg (macOS, Universal)" \
            "output/package/Open Island.zip#Open Island.zip (macOS, Universal)"

      - name: Append install instructions to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing="$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json body -q .body)"
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes "$(cat <<EOF
          ${existing}

          ---

          ## Installation

          1. Download **Open Island.dmg**, open it, and drag **Open Island** to **Applications**.
          2. Requires **macOS 14+** (Apple Silicon and Intel).
          3. This fork is work-safe: Codex + Claude only, no Sparkle auto-update, no Watch/LAN relay, no generic outbound-network entitlement.

          > This fork build is ad-hoc signed unless you later configure Apple Developer ID secrets. On first launch, right-click **Open** if Gatekeeper asks for confirmation.
          EOF
          )"
